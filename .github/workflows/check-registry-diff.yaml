name: Check Semantic Convention Registry

on:
  pull_request:
    paths:
      - 'schemas/**'
      - 'scripts/semconv/**'
      - 'instrumentation/**/semconv/**'
      - '.semconv-version'
  push:
    branches:
      - main
    paths:
      - 'schemas/**'
      - 'scripts/semconv/**'
      - 'instrumentation/**/semconv/**'
      - '.semconv-version'

permissions:
  contents: read

jobs:
  registry-check:
    name: Validate Semantic Conventions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1

      - name: Read semconv version
        id: read-version
        run: |
          if [ ! -f .semconv-version ]; then
            echo "::error::.semconv-version file not found"
            exit 1
          fi
          CURRENT_VERSION=$(grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' .semconv-version | head -1 | tr -d '[:space:]')
          if [ -z "$CURRENT_VERSION" ]; then
            echo "::error::No version found in .semconv-version file"
            exit 1
          fi
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "Current semantic conventions version: $CURRENT_VERSION"

      - name: Validate registry manifest matches .semconv-version
        run: |
          # The upstream dependency pinned in the registry manifest must match
          # the version declared in .semconv-version. `make lint-schema` also
          # enforces this, but check it explicitly so the failure is obvious.
          MANIFEST_VERSION=$(grep -oE 'upstream-v[0-9]+\.[0-9]+\.[0-9]+' schemas/otelc/registry_manifest.yaml | head -1 | sed -E 's/upstream-v//')
          EXPECTED_VERSION=$(echo "${{ steps.read-version.outputs.current_version }}" | sed 's/^v//')

          if [ -z "$MANIFEST_VERSION" ]; then
            echo "::error::Could not read the upstream version from schemas/otelc/registry_manifest.yaml"
            exit 1
          fi

          echo "registry_manifest.yaml upstream dependency: v$MANIFEST_VERSION"
          echo "Expected from .semconv-version: v$EXPECTED_VERSION"

          if [ "$MANIFEST_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "::error::Version mismatch! registry_manifest.yaml pins upstream v$MANIFEST_VERSION but .semconv-version specifies v$EXPECTED_VERSION"
            echo "::error::Please update either schemas/otelc/registry_manifest.yaml or .semconv-version so they match"
            exit 1
          fi

          echo "✅ Registry manifest version consistency check passed"

      - name: Validate code uses correct semconv version
        run: |
          # Detect the semconv version used in the Go code imports
          DETECTED_VERSION=$(grep -r "semconv/v" instrumentation/ --include="*.go" | \
            grep -o "semconv/v[0-9]*\.[0-9]*\.[0-9]*" | \
            sort -u | \
            head -1 | \
            sed 's/semconv\///')

          EXPECTED_VERSION="${{ steps.read-version.outputs.current_version }}"

          if [ -z "$DETECTED_VERSION" ]; then
            echo "::error::No semconv version detected in Go imports in instrumentation/**/semconv/"
            exit 1
          fi

          echo "Detected version in Go code: $DETECTED_VERSION"
          echo "Expected version from .semconv-version: $EXPECTED_VERSION"

          if [ "$DETECTED_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "::error::Version mismatch! Go code imports $DETECTED_VERSION but .semconv-version specifies $EXPECTED_VERSION"
            echo "::error::Please update either the Go imports or the .semconv-version file to match"
            exit 1
          fi

          echo "✅ Version consistency check passed"

      - name: Check registry for violations
        run: |
          # Runs OTel Weaver from an OCI image (ubuntu-latest has Docker and jq
          # preinstalled). Internally fetches the pinned upstream semconv into
          # schemas/otelc/.deps/ and runs `weaver registry check --future`.
          echo "Validating the otelc semantic-convention registry (schemas/otelc)"
          make lint-schema
